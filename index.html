<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آخر 3 تحديثات إخبارية</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 20px; margin-bottom: 20px; border-top: 4px solid #58a6ff; position: relative; }
        .date-group-header { background: #21262d; padding: 10px 20px; border-radius: 8px; margin-bottom: 15px; border-right: 5px solid #f85149; color: #f85149; font-weight: bold; font-size: 18px; }
        .title { color: #58a6ff; font-size: 22px; margin: 0 0 10px 0; font-weight: bold; }
        .meta { display: flex; justify-content: space-between; font-size: 12px; color: #8b949e; margin-bottom: 15px; background: #0d1117; padding: 5px 10px; border-radius: 5px; }
        .content { font-size: 16px; line-height: 1.6; white-space: pre-wrap; }
        #status { text-align: center; margin-top: 50px; font-size: 18px; color: #8b949e; }
        .link { display: inline-block; margin-top: 15px; color: #58a6ff; text-decoration: none; font-weight: bold; border: 1px solid #58a6ff; padding: 5px 12px; border-radius: 5px; }
        .link:hover { background: #58a6ff; color: #ffffff; }
    </style>
</head>
<body>
    <div class="container">
        <div id="status">جاري جلب آخر 3 تحديثات...</div>
        <div id="news-container"></div>
    </div>

    <script>
        const SHEET_ID = '1qfzl_5jC4pNUVVwA18_p0i9aXpCdaUZnCCmQAdyHSLc';

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const country = params.get('country');
            if (!country) {
                document.getElementById('status').innerText = "يرجى تحديد الدولة، مثال: ?country=تونس";
                return;
            }
            loadNews(decodeURIComponent(country));
        }

        async function loadNews(target) {
            // نطلب البيانات الخاصة بالدولة فقط، وسنقوم بالترتيب داخل المتصفح لضمان الدقة
            const query = encodeURIComponent(`SELECT A, B, C, D, E, F WHERE A = '${target}'`);
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tq=${query}`;

            try {
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substring(47, text.length - 2));
                const rows = json.table.rows;
                
                const container = document.getElementById('news-container');
                const status = document.getElementById('status');

                if (!rows || rows.length === 0) {
                    status.innerText = "لا توجد أخبار مسجلة لـ " + target;
                    return;
                }

                // 1. تحويل البيانات إلى كائنات مريحة والتعامل مع التواريخ
                let allNews = rows.map(r => {
                    // تحويل قيمة التاريخ من تنسيق Google Sheets إلى كائن Date صالح للمقارنة
                    const rawDate = r.c[3]?.f || r.c[3]?.v;
                    return {
                        country: r.c[0]?.v,
                        title: r.c[1]?.v,
                        content: r.c[2]?.v,
                        dateText: rawDate,
                        // محاولة استخراج رقم التاريخ للمقارنة (يعالج تنسيقات مثل Date(2026,2,25))
                        dateValue: new Date(rawDate).getTime() || 0, 
                        sourceName: r.c[4]?.v,
                        sourceLink: r.c[5]?.v
                    };
                });

                // 2. ترتيب الأخبار: الأحدث أولاً (تنازلياً)
                allNews.sort((a, b) => b.dateValue - a.dateValue);

                // 3. استخراج آخر 3 تواريخ فريدة تم العثور عليها
                const uniqueDates = [...new Set(allNews.map(n => n.dateText))].slice(0, 3);

                status.style.display = "none";
                container.innerHTML = "";

                // 4. عرض الأخبار مصنفة حسب تلك التواريخ
                uniqueDates.forEach(date => {
                    container.innerHTML += `<div class="date-group-header">تحديثات تاريخ: ${date}</div>`;
                    
                    allNews.filter(n => n.dateText === date).forEach(item => {
                        container.innerHTML += `
                            <div class="card">
                                <div class="meta">
                                    <span>📍 ${item.country}</span>
                                    <span>📅 ${item.dateText}</span>
                                </div>
                                <div class="title">${item.title}</div>
                                <div class="content">${item.content}</div>
                                <a href="${item.sourceLink}" target="_blank" class="link">🔗 المصدر: ${item.sourceName}</a>
                            </div>`;
                    });
                });

            } catch (e) {
                console.error(e);
                document.getElementById('status').innerText = "خطأ في الاتصال أو في معالجة البيانات.";
            }
        }
        init();
    </script>
</body>
</html>
