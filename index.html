<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الأخبار المحدث</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 20px; margin-bottom: 20px; border-top: 4px solid #58a6ff; }
        .title { color: #58a6ff; font-size: 22px; margin: 0 0 10px 0; font-weight: bold; }
        .meta { display: flex; justify-content: space-between; font-size: 12px; color: #8b949e; margin-bottom: 15px; background: #0d1117; padding: 5px 10px; border-radius: 5px; }
        .content { font-size: 16px; line-height: 1.6; white-space: pre-wrap; }
        #status { text-align: center; margin-top: 50px; font-size: 18px; color: #8b949e; }
        .link { display: inline-block; margin-top: 15px; color: #58a6ff; text-decoration: none; font-weight: bold; }
        .latest-label { background: #238636; color: white; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="status">جاري فحص التحديثات الأخيرة...</div>
        <div id="news-container"></div>
    </div>

    <script>
        const SHEET_ID = '1qfzl_5jC4pNUVVwA18_p0i9aXpCdaUZnCCmQAdyHSLc';

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const country = params.get('country');
            if (!country) {
                document.getElementById('status').innerText = "يرجى تحديد الدولة، مثال: ?country=تونس";
                return;
            }
            loadNews(decodeURIComponent(country));
        }

        async function loadNews(target) {
            // التعديل السحري: نطلب من جوجل ترتيب البيانات حسب العمود D تنازلياً (DESC)
            // هذا يضمن أن التاريخ الأحدث يكون دائماً في أول النتائج
            const query = encodeURIComponent(`SELECT A, B, C, D, E, F WHERE A = '${target}' ORDER BY D DESC`);
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tq=${query}`;

            try {
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substring(47, text.length - 2));
                const rows = json.table.rows;
                const container = document.getElementById('news-container');
                const status = document.getElementById('status');

                if (!rows || rows.length === 0) {
                    status.innerText = "لا توجد أخبار مسجلة لـ " + target;
                    return;
                }

                status.style.display = "none";
                container.innerHTML = "";

                // بما أننا رتبنا البيانات DESC، فأول سطر هو حتماً الأحدث
                const latestDateText = rows[0].c[3]?.f || rows[0].c[3]?.v;

                rows.forEach(r => {
                    const currentDate = r.c[3]?.f || r.c[3]?.v;
                    
                    // نعرض فقط الأخبار التي تطابق أحدث تاريخ موجود في النتائج المرتبة
                    if (currentDate === latestDateText) {
                        container.innerHTML += `
                            <div class="card">
                                <div class="meta">
                                    <span>📍 ${r.c[0]?.v} <span class="latest-label">تحديث أخير</span></span>
                                    <span>📅 ${currentDate}</span>
                                </div>
                                <div class="title">${r.c[1]?.v}</div>
                                <div class="content">${r.c[2]?.v}</div>
                                <a href="${r.c[5]?.v}" target="_blank" class="link">🔗 المصدر: ${r.c[4]?.v}</a>
                            </div>`;
                    }
                });

            } catch (e) {
                document.getElementById('status').innerText = "خطأ في جلب البيانات. تأكد من اتصالك.";
            }
        }
        init();
    </script>
</body>
</html>
