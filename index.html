<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آخر 3 تحديثات إخبارية</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 20px; margin-bottom: 20px; border-top: 4px solid #58a6ff; }
        .date-group-header { background: #21262d; padding: 10px 20px; border-radius: 8px; margin-bottom: 15px; border-right: 5px solid #f85149; color: #f85149; font-weight: bold; font-size: 18px; }
        .title { color: #58a6ff; font-size: 22px; margin: 0 0 10px 0; font-weight: bold; }
        .meta { display: flex; justify-content: space-between; font-size: 12px; color: #8b949e; margin-bottom: 15px; background: #0d1117; padding: 5px 10px; border-radius: 5px; }
        .content { font-size: 16px; line-height: 1.6; white-space: pre-wrap; }
        #status { text-align: center; margin-top: 50px; font-size: 18px; color: #8b949e; }
        .link { display: inline-block; margin-top: 15px; color: #58a6ff; text-decoration: none; font-weight: bold; border: 1px solid #58a6ff; padding: 5px 12px; border-radius: 5px; }
        .link:hover { background: #58a6ff; color: #ffffff; }
    </style>
</head>
<body>
    <div class="container">
        <div id="status">جاري جلب آخر التحديثات...</div>
        <div id="news-container"></div>
    </div>

    <script>
        // الرابط المباشر لتصدير البيانات كـ CSV لضمان جلب كل الصفوف الجديدة فوراً
        const SHEET_ID = '1qfzl_5jC4pNUVVwA18_p0i9aXpCdaUZnCCmQAdyHSLc';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const country = params.get('country');
            if (!country) {
                document.getElementById('status').innerText = "يرجى تحديد الدولة في الرابط.";
                return;
            }
            loadNews(decodeURIComponent(country));
        }

        async function loadNews(target) {
            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                
                // تحويل نص CSV إلى مصفوفة صفوف
                const rows = data.split('\n').map(row => {
                    // تعامل ذكي مع الفواصل داخل النصوص
                    return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/"/g, '').trim());
                });

                // فلترة البيانات بناءً على الدولة (العمود الأول index 0)
                let filteredNews = rows.filter(r => r[0] === target).map(r => ({
                    country: r[0],
                    title: r[1],
                    content: r[2],
                    dateText: r[3],
                    // إنشاء مفتاح ترتيب (نحول التاريخ لـ YYYYMMDD إذا أمكن)
                    sortKey: r[3] ? r[3].split('/').reverse().join('') : '0', 
                    sourceName: r[4],
                    sourceLink: r[5]
                }));

                // ترتيب من الأحدث للأقدم
                filteredNews.sort((a, b) => b.sortKey.localeCompare(a.sortKey));

                const container = document.getElementById('news-container');
                const status = document.getElementById('status');

                if (filteredNews.length === 0) {
                    status.innerText = "لا توجد أخبار مسجلة لـ " + target;
                    return;
                }

                status.style.display = "none";
                container.innerHTML = "";

                // جلب آخر 3 تواريخ فريدة
                const uniqueDates = [...new Set(filteredNews.map(n => n.dateText))].slice(0, 3);

                uniqueDates.forEach(date => {
                    container.innerHTML += `<div class="date-group-header">تحديثات تاريخ: ${date}</div>`;
                    
                    filteredNews.filter(n => n.dateText === date).forEach(item => {
                        container.innerHTML += `
                            <div class="card">
                                <div class="meta">
                                    <span>📍 ${item.country}</span>
                                    <span>📅 ${item.dateText}</span>
                                </div>
                                <div class="title">${item.title}</div>
                                <div class="content">${item.content}</div>
                                <a href="${item.sourceLink}" target="_blank" class="link">🔗 المصدر: ${item.sourceName}</a>
                            </div>`;
                    });
                });

            } catch (e) {
                console.error(e);
                document.getElementById('status').innerText = "خطأ في الاتصال بالبيانات.";
            }
        }
        init();
    </script>
</body>
</html>
