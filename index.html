<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أخبار الدول</title>
    <style>
        body { background-color: #121212; color: #e8eaed; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: #1e1e1e; border-radius: 12px; border-top: 5px solid #8ab4f8; padding: 20px; margin-bottom: 20px; border: 1px solid #3c4043; }
        .title { color: #8ab4f8; font-size: 22px; margin-bottom: 10px; }
        .meta { font-size: 13px; color: #9aa0a6; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .content { line-height: 1.7; color: #d1d1d1; }
        #status { text-align: center; margin-top: 50px; color: #9aa0a6; }
        a { color: #8ab4f8; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div id="status">جاري جلب البيانات...</div>
        <div id="news-container"></div>
    </div>

    <script>
        const SHEET_ID = '1qfzl_5jC4pNUVVwA18_p0i9aXpCdaUZnCCmQAdyHSLc';
        
        function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const country = urlParams.get('country');

            if (country) {
                fetchData(decodeURIComponent(country));
            } else {
                document.getElementById('status').innerText = "يرجى تحديد دولة في الرابط، مثال: ?country=العراق";
            }
        }

        function fetchData(query) {
            // جلب كافة البيانات الخاصة بالدولة لفرزها برمجياً
            const gql = encodeURIComponent(`SELECT A, B, C, D, E, F WHERE A = '${query}'`);
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tq=${gql}`;

            fetch(url).then(res => res.text()).then(text => {
                const json = JSON.parse(text.substring(47, text.length - 2));
                const rows = json.table.rows;
                const container = document.getElementById('news-container');
                const statusLabel = document.getElementById('status');
                
                statusLabel.style.display = "none";
                container.innerHTML = "";

                if (!rows || rows.length === 0) {
                    statusLabel.innerText = "لا توجد نتائج لـ " + query;
                    statusLabel.style.display = "block";
                    return;
                }

                // --- منطق البحث عن أحدث تاريخ برمجياً ---
                // سنقوم بفرز الصفوف بناءً على التاريخ (العمود D)
                let allRows = rows.map(r => ({
                    country: r.c[0]?.v,
                    title: r.c[1]?.v,
                    text: r.c[2]?.v,
                    dateStr: r.c[3]?.f || r.c[3]?.v, // النص الظاهر للتاريخ
                    source: r.c[4]?.v,
                    link: r.c[5]?.v
                }));

                // استخراج قائمة التواريخ الفريدة المتاحة لهذه الدولة
                let uniqueDates = [...new Set(allRows.map(item => item.dateStr))];
                
                // نفترض أن الجدول مرتب زمنياً من الأقدم للأحدث، فنأخذ آخر تاريخ في القائمة
                // إذا كان الجدول غير مرتب، يفضل ترتيبه في Google Sheets أولاً
                const latestDate = uniqueDates[uniqueDates.length - 1];

                // عرض الأخبار التي تطابق هذا التاريخ الأحدث فقط
                allRows.filter(item => item.dateStr === latestDate).forEach(item => {
                    container.innerHTML += `
                        <div class="card">
                            <div class="meta"><span>📍 ${item.country}</span><span>📅 ${item.dateStr}</span></div>
                            <div class="title">${item.title}</div>
                            <div class="content">${item.text}</div>
                            <div style="margin-top:15px"><a href="${item.link}" target="_blank">🔗 المصدر: ${item.source}</a></div>
                        </div>`;
                });
            }).catch(err => {
                document.getElementById('status').innerText = "حدث خطأ أثناء جلب البيانات.";
            });
        }
        init();
    </script>
</body>
</html>
