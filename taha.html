<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>التقرير الإعلامي الموجز - إدارة الأمن والمعلومات</title>
    <meta name="description" content="القوات المسلحة العربية الليبية - القيادة العامة - رئاسة أركان القوات البرية - إدارة الأمن والمعلومات">
    
    <meta property="og:title" content="التقرير الإعلامي الموجز">
    <meta property="og:description" content="إدارة الأمن والمعلومات - القوات المسلحة العربية الليبية">
    <meta property="og:image" content="https://lh3.googleusercontent.com/d/1eOGlRDtphK4Ad-l8o7xlpTAXuBLklp_x">
    <meta property="og:type" content="website">

    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --border: #334155;
            --banner-bg: #0f172a;
            --gold: #eab308; 
            --gold-light: #fde047;
            /* اللون البرتقالي الغامق المطلوب */
            --dark-orange: #f97316; 
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 10px;
        }

        .container { max-width: 850px; margin: 0 auto; }

        /* البانر العلوي */
        .banner {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 12px;
            border: 1px solid var(--gold);
            padding: 20px;
            margin-top: 10px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .banner-right {
            text-align: right;
            line-height: 1.6;
            border-right: 4px solid var(--gold);
            padding-right: 15px;
            flex-shrink: 0;
        }

        .banner-right h2 {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--gold-light);
        }

        .banner-right p {
            margin: 0;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--gold);
        }

        .banner-center {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            margin-left: 140px; 
        }

        .banner-center img {
            height: 115px;
            width: auto;
        }

        header h1 {
            text-align: center;
            color: var(--accent);
            font-size: 1.9rem;
            margin-bottom: 30px;
            font-weight: 800;
        }

        /* البطاقات */
        #cardsContainer { display: flex; flex-direction: column; gap: 20px; }

        .report-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .country-side { display: flex; align-items: center; gap: 10px; }
        .flag-img { width: 32px; border-radius: 3px; }
        .country-name { font-weight: 800; font-size: 1.15rem; color: var(--accent); }
        
        /* تحديث لون التاريخ */
        .date-side { 
            font-size: 0.95rem; 
            font-weight: 800; 
            color: var(--dark-orange); 
            direction: ltr; 
        }

        .card-body {
            font-size: 1.2rem;
            font-weight: 700;
            line-height: 1.7;
            padding: 10px 0;
            border-top: 1px solid #33415588;
        }

        .btn-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 800;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        @media (max-width: 768px) {
            .banner { flex-direction: column-reverse; gap: 20px; text-align: center; }
            .banner-right { border-right: none; padding-right: 0; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
            .banner-center { margin-left: 0; }
        }

        .loader { border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 50px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="banner">
        <div class="banner-right">
            <h2>القوات المسلحة العربية الليبية</h2>
            <p>القيادة العامة</p>
            <p>رئاسة أركان القوات البرية</p>
            <p>إدارة الأمن والمعلومات</p>
        </div>
        <div class="banner-center">
            <img src="https://lh3.googleusercontent.com/d/1eOGlRDtphK4Ad-l8o7xlpTAXuBLklp_x" alt="Logo">
        </div>
    </div>

    <header>
        <h1>التقرير الإعلامي الموجز</h1>
    </header>

    <div id="loader" class="loader"></div>
    <div id="cardsContainer"></div>
</div>

<script>
    const SHEET_ID = '1asRRLxuFIpkxUy3WPzerYt-yx8N5pW0-AFWUWCKMixI';
    const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

    const countryToCode = {
        "ليبيا": "ly", "السعودية": "sa", "مصر": "eg", "الإمارات": "ae",
        "قطر": "qa", "الكويت": "kw", "البحرين": "bh", "عمان": "om",
        "الأردن": "jo", "لبنان": "lb", "سوريا": "sy", "فلسطين": "ps",
        "العراق": "iq", "تونس": "tn", "المغرب": "ma", "الجزائر": "dz",
        "السودان": "sd", "اليمن": "ye", "موريتانيا": "mr",
        "تشاد": "td", "مالي": "ml", "إيران": "ir", "ايران": "ir", 
        "الصومال": "so", "النيجر": "ne" 
    };

    function getFlagUrl(countryName) {
        if (!countryName) return "";
        let code = "";
        const cleanName = countryName.trim();
        for (let key in countryToCode) {
            if (cleanName.includes(key)) {
                code = countryToCode[key];
                break;
            }
        }
        return code ? `https://flagcdn.com/w80/${code}.png` : ""; 
    }

    async function loadData() {
        try {
            const response = await fetch(URL);
            const data = await response.text();
            const rows = data.split('\n').filter(r => r.trim() !== "").map(row => 
                row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
                   .map(cell => cell.replace(/^"|"$/g, '').trim())
            );

            const container = document.getElementById('cardsContainer');
            let htmlContent = '';

            for (let i = 1; i < rows.length; i++) {
                const [date, country, summary, link] = rows[i];
                if (!date && !country) continue;
                const flag = getFlagUrl(country);

                htmlContent += `
                    <div class="report-card">
                        <div class="card-header">
                            <div class="country-side">
                                ${flag ? `<img src="${flag}" class="flag-img">` : '🌐'}
                                <span class="country-name">${country || 'غير معروف'}</span>
                            </div>
                            <div class="date-side">${date || '-'}</div>
                        </div>
                        <div class="card-body">${summary || '-'}</div>
                        <div class="card-footer">
                            <a href="${link}" target="_blank" class="btn-link">🔗 رابط الخبر</a>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = htmlContent;
            document.getElementById('loader').style.display = 'none';
        } catch (e) {
            document.getElementById('loader').innerHTML = "فشل تحميل البيانات.";
        }
    }
    loadData();
</script>
</body>
</html>
